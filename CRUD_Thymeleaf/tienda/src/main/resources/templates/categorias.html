<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TØP - Gestión de Categorías</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e31937; --black: #050505; --yellow: #fce300; --white: #ffffff; --gray-card: rgba(18, 18, 18, 0.9); }
        body { margin: 0; font-family: 'Roboto Mono', monospace; background-color: var(--black); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container-principal { position: relative; z-index: 10; max-width: 1100px; margin: 40px auto; background: var(--gray-card); padding: 30px; border-left: 5px solid var(--red); backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .titulo { font-family: 'Oswald', sans-serif; text-align: center; color: var(--white); font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 30px; border-bottom: 2px solid var(--red); display: inline-block; width: 100%; padding-bottom: 10px; text-transform: uppercase; }
        .header-acciones { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; }
        .input-search { background: #000; border: 1px solid #333; color: white; padding: 10px; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; font-family: 'Oswald', sans-serif; transition: all 0.3s; }
        .btn-buscar { background-color: var(--red); color: white; }
        .btn-nuevo { background-color: var(--yellow); color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.3); }
        th { background-color: #000; color: var(--red); padding: 15px; border-bottom: 2px solid var(--red); }
        td { padding: 15px; border-bottom: 1px solid #222; text-align: center; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); }
        .modal-content { background-color: var(--gray-card); margin: 10% auto; padding: 30px; width: 350px; border: 2px solid var(--red); text-align: center; }
        .campo input { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: white; margin-bottom: 15px; }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container-principal">
    <h1 class="titulo">CONTROL_DE_CATEGORIAS</h1>

    <div class="header-acciones">
        <form th:action="@{/categorias/buscar}" method="get">
            <input type="number" name="id" class="input-search" placeholder="CÓDIGO_ID" required>
            <button type="submit" class="btn btn-buscar">BUSCAR</button>
        </form>
        <button type="button" onclick="abrirModal('nuevo')" class="btn btn-nuevo">+ NUEVA_CATEGORIA</button>
    </div>

    <table>
        <thead>
        <tr><th>ID</th><th>NOMBRE</th><th>DESCRIPCIÓN</th><th>ACCIONES</th></tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categorias}">
            <td th:text="${c.idCategoria}"></td>
            <td th:text="${c.nombreCategoria}"></td>
            <td th:text="${c.descripcionCategoria}"></td>
            <td>
                <button type="button" class="btn btn-editar"
                        th:data-id="${c.idCategoria}"
                        th:data-nombre="${c.nombreCategoria}"
                        th:data-descripcion="${c.descripcionCategoria}"
                        onclick="prepararEditar(this)">EDITAR</button>
                <button type="button" class="btn btn-eliminar"
                        th:data-id="${c.idCategoria}"
                        onclick="prepararEliminar(this)">ELIMINAR</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div id="miModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitulo" style="color:white;">EXPEDIENTE_CATEGORIA</h2>
        <form id="formCategoria" method="post">
            <input type="hidden" name="idCategoria" id="inputID">

            <div class="campo">
                <input type="text" name="nombreCategoria" id="inputNombre" placeholder="NOMBRE CATEGORÍA" required>
            </div>
            <div class="campo">
                <input type="text" name="descripcionCategoria" id="inputDescripcion" placeholder="DESCRIPCIÓN" required>
            </div>

            <button type="submit" id="btnAccion" class="btn btn-buscar">EJECUTAR</button>
            <button type="button" onclick="cerrarModal()" class="btn btn-cancelar">ABORTAR</button>
        </form>
    </div>
</div>

<script>
    // ... (tu lógica de partículas y abrirModal se mantiene) ...
    function abrirModal(tipo, id, nombre, descripcion) {
        document.getElementById('miModal').style.display = "block";
        if (tipo === 'nuevo') {
            document.getElementById('formCategoria').action = "/categorias/guardar";
        } else if (tipo === 'editar') {
            document.getElementById('formCategoria').action = "/categorias/actualizar";
            document.getElementById('inputID').value = id;
            document.getElementById('inputNombre').value = nombre;
            document.getElementById('inputDescripcion').value = descripcion;
        }
    }
    function cerrarModal() { document.getElementById('miModal').style.display = "none"; }
</script>
</body>
</html>
