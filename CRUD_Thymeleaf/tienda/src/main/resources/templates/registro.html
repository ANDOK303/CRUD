<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TØP - New Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* COPIA AQUÍ TODOS LOS ESTILOS DE TU LOGIN.HTML PARA QUE SE VEAN IGUAL */
        :root { --red: #e31937; --black: #050505; --yellow: #fce300; --white: #ffffff; --gray: #121212; }
        body { margin: 0; background-color: var(--black); font-family: 'Roboto Mono', monospace; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: var(--white); }
        #particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .login-card { position: relative; z-index: 10; background: rgba(18, 18, 18, 0.9); padding: 50px; width: 100%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        .titulo { font-family: 'Oswald', sans-serif; font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 30px; border-bottom: 2px solid var(--red); padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; padding: 10px 0; color: var(--white); outline: none; transition: 0.4s; }
        input:focus { border-bottom-color: var(--yellow); }
        button { width: 100%; background: transparent; border: 2px solid var(--red); color: var(--red); padding: 15px; font-family: 'Oswald'; cursor: pointer; letter-spacing: 4px; transition: 0.3s; margin-top: 20px; }
        button:hover { background: var(--red); color: var(--white); }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="login-card">
    <div class="titulo">CREATE_ID</div>
    <form th:action="@{/registro/guardar}" method="post">
        <div class="input-group">
            <input type="text" name="username" placeholder="Choose Username" required>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Choose Passcode" required>
        </div>
        <button type="submit">REGISTER ACCESS</button>
        <a th:href="@{/login}" style="display: block; margin-top: 15px; color: gray; text-decoration: none; font-size: 0.8rem;">BACK TO LOGIN</a>
    </form>
</div>
</body>
</html>
