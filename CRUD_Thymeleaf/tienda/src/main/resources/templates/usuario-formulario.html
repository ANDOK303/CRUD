<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicion} ? 'TØP - Editar Usuario' : 'TØP - Nuevo Usuario'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e31937;
            --black: #050505;
            --yellow: #fce300;
            --white: #ffffff;
            --gray-card: rgba(18, 18, 18, 0.9);
        }

        body {
            margin: 0;
            font-family: 'Roboto Mono', monospace;
            background-color: var(--black);
            color: var(--white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            background: var(--gray-card);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 5px solid var(--red);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: var(--white);
            border-bottom: 1px solid var(--red);
            padding-bottom: 10px;
        }

        .campo {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--red);
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: white;
            font-family: 'Roboto Mono', monospace;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--yellow);
        }

        .error {
            color: var(--yellow);
            font-size: 12px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .acciones {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            font-size: 1rem;
        }

        .btn-guardar {
            background-color: var(--red);
            color: white;
        }

        .btn-guardar:hover {
            background-color: white;
            color: black;
        }

        .btn-volver {
            background-color: transparent;
            border: 1px solid #444;
            color: white;
        }

        .btn-volver:hover {
            border-color: var(--white);
        }

        .symbol {
            text-align: center;
            margin-top: 20px;
            opacity: 0.5;
            font-weight: bold;
        }
    </style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1 th:text="${modoEdicion} ? 'Modificar Registro' : 'Nuevo Registro'"></h1>

    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">

        <input type="hidden" th:field="*{idUsuario}">

        <div class="campo">
            <label for="nombreUsuario">Nombre</label>
            <input type="text" id="nombreUsuario" th:field="*{nombreUsuario}" placeholder="INGRESAR NOMBRE...">
            <div class="error" th:if="${#fields.hasErrors('nombreUsuario')}" th:errors="*{nombreUsuario}"></div>
        </div>

        <div class="campo">
            <label for="apellidoUsuario">Apellido</label>
            <input type="text" id="apellidoUsuario" th:field="*{apellidoUsuario}" placeholder="INGRESAR APELLIDO...">
            <div class="error" th:if="${#fields.hasErrors('apellidoUsuario')}" th:errors="*{apellidoUsuario}"></div>
        </div>

        <div class="campo">
            <label for="edadUsuario">Edad</label>
            <input type="number" id="edadUsuario" th:field="*{edadUsuario}" placeholder="00">
            <div class="error" th:if="${#fields.hasErrors('edadUsuario')}" th:errors="*{edadUsuario}"></div>
        </div>

        <div class="acciones">
            <button type="submit" class="btn btn-guardar">
                [[${modoEdicion} ? 'Actualizar' : 'Confirmar']]
            </button>

            <a th:href="@{/usuarios}" class="btn btn-volver">Cancelar</a>
        </div>
    </form>

    <div class="symbol">|-/</div>
</div>

<script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedY = Math.random() * 1 + 0.3;
            this.opacity = Math.random() * 0.4 + 0.1;
        }
        update() {
            this.y -= this.speedY;
            if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; }
        }
        draw() {
            ctx.fillStyle = `rgba(227, 25, 55, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function init() { for (let i = 0; i < 50; i++) { particles.push(new Particle()); } }
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas. Height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    init(); animate();
</script>

</body>
</html>
