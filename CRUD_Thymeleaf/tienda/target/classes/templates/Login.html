<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TØP - Portal Clancy</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e31937; --black: #050505; --yellow: #fce300; --white: #ffffff; --gray: #121212; }
        body { margin: 0; padding: 0; background-color: var(--black); font-family: 'Roboto Mono', monospace; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: var(--white); }
        #particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .login-card { position: relative; z-index: 10; background: rgba(18, 18, 18, 0.9); padding: 50px; width: 100%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); text-align: center; box-shadow: 0 0 40px rgba(0, 0, 0, 0.8); }
        .glitch { font-family: 'Oswald', sans-serif; font-size: 3rem; font-weight: bold; text-transform: uppercase; position: relative; display: inline-block; margin-bottom: 30px; color: var(--white); }
        .input-group { margin-bottom: 20px; position: relative; }
        input { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; padding: 10px 0; color: var(--white); font-size: 1.1rem; outline: none; transition: border-color 0.4s; }
        input:focus { border-bottom-color: var(--red); }
        button { width: 100%; background: transparent; border: 2px solid var(--red); color: var(--red); padding: 15px; font-family: 'Oswald', sans-serif; font-size: 1.2rem; cursor: pointer; letter-spacing: 4px; transition: all 0.3s; margin-top: 20px; }
        button:hover { background: var(--red); color: var(--white); }
        .register-link { display: block; margin-top: 25px; color: var(--yellow); text-decoration: none; font-family: 'Oswald', sans-serif; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; opacity: 0.8; }
        .msg { font-size: 0.7rem; margin-bottom: 20px; padding: 10px; border: 1px solid; }
        .error-msg { color: var(--red); border-color: var(--red); }
        .success-msg { color: var(--yellow); border-color: var(--yellow); }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="login-card">
    <div class="glitch">CLANCY</div>

    <div th:if="${param.success}" class="msg success-msg">
        IDENTITY REGISTERED. LOGIN NOW.
    </div>

    <div th:if="${param.error_exists}" class="msg error-msg">
        IDENTITY ALREADY TAKEN.
    </div>

    <div th:if="${param.error}" class="msg error-msg">STATUS: INSECURE_ACCESS_DENIED</div>
    <div th:if="${param.logout}" class="msg success-msg">SAY GOODBYE TO THE CITY</div>

    <form th:action="@{/login}" method="post">
        <div class="input-group">
            <input type="text" name="username" placeholder="Identify" required autofocus>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Passcode" required>
        </div>
        <button type="submit">PUSH ON THROUGH</button>

        <a th:href="@{/registro}" class="register-link">
            NEW IDENTITY? <span style="text-decoration: underline;">JOIN THE REBELLION</span>
        </a>
    </form>
</div>

<script>
    // ... (Tu script de partículas igual al original) ...
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    class Particle {
        constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2 + 0.5; this.speedX = Math.random() * 1 - 0.5; this.speedY = Math.random() * 1 + 0.5; this.opacity = Math.random() * 0.5 + 0.2; }
        update() { this.y -= this.speedY; this.x += this.speedX; if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; } }
        draw() { ctx.fillStyle = `rgba(227, 25, 55, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    function init() { for (let i = 0; i < 100; i++) particles.push(new Particle()); }
    function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
    init(); animate();
</script>

</body>
</html>
