<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TØP - Gestión de Categorías</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e31937;
            --black: #050505;
            --yellow: #fce300;
            --white: #ffffff;
            --gray-card: rgba(18, 18, 18, 0.9);
        }

        body {
            margin: 0;
            font-family: 'Roboto Mono', monospace;
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container-principal {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 40px auto;
            background: var(--gray-card);
            padding: 30px;
            border-left: 5px solid var(--red);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .titulo {
            font-family: 'Oswald', sans-serif;
            text-align: center;
            color: var(--white);
            font-size: 2.5rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--red);
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        .header-acciones {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
        }

        .buscador-form { display: flex; gap: 10px; }

        .input-search {
            background: #000;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 0;
            font-family: 'Roboto Mono', monospace;
        }

        .btn {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-buscar { background-color: var(--red); color: white; }
        .btn-buscar:hover { background-color: white; color: black; }

        .btn-home { background-color: transparent; border: 1px solid var(--white); color: white; }
        .btn-home:hover { background-color: var(--white); color: black; }

        .btn-nuevo { background-color: var(--yellow); color: black; }
        .btn-nuevo:hover { background-color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(0,0,0,0.3);
        }

        th {
            background-color: #000;
            color: var(--red);
            font-family: 'Oswald', sans-serif;
            padding: 15px;
            border-bottom: 2px solid var(--red);
            letter-spacing: 2px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #222;
            text-align: center;
        }

        tr:hover { background-color: rgba(227, 25, 55, 0.05); }

        .btn-editar { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); font-size: 0.8rem; margin-right: 5px; }
        .btn-editar:hover { background: var(--yellow); color: black; }

        .btn-eliminar { background: transparent; border: 1px solid var(--red); color: var(--red); font-size: 0.8rem; }
        .btn-eliminar:hover { background: var(--red); color: white; }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--gray-card);
            margin: 10% auto;
            padding: 30px;
            width: 350px;
            border: 2px solid var(--red);
            text-align: center;
        }

        .campo { margin-bottom: 20px; text-align: left; }
        .campo label { display: block; font-size: 0.8rem; color: var(--red); margin-bottom: 5px; }
        .campo input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        .campo input:focus { border-color: var(--yellow); }

        .modal-footer { display: flex; justify-content: space-between; margin-top: 25px; }

        .btn-cancelar { background: #333; color: white; }

        .symbol-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--white);
            letter-spacing: 8px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container-principal">
    <h1 class="titulo">CONTROL_DE_CATEGORIAS</h1>

    <div class="header-acciones">
        <form th:action="@{/categorias/buscar}" method="get" class="buscador-form">
            <input type="number" name="id" class="input-search" placeholder="CÓDIGO_ID" required>
            <button type="submit" class="btn btn-buscar">BUSCAR</button>
            <a th:href="@{/categorias}" class="btn btn-home">REINICIAR</a>
        </form>

        <div style="display: flex; gap: 10px;">
            <a th:href="@{/}" class="btn btn-home">VOLVER_AL_INICIO</a>
            <button type="button" onclick="abrirModal('nuevo')" class="btn btn-nuevo">+ NUEVA_CATEGORIA</button>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>NOMBRE</th>
            <th>DESCRIPCIÓN</th>
            <th>ACCIONES</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categorias}">
            <td th:text="${c.idCategoria}"></td>
            <td th:text="${c.nombreCategoria}"></td>
            <td th:text="${c.descripcionCategoria}"></td>
            <td>
                <button type="button" class="btn btn-editar"
                        th:data-id="${c.idCategoria}"
                        th:data-nombre="${c.nombreCategoria}"
                        th:data-descripcion="${c.descripcionCategoria}"
                        onclick="prepararEditar(this)">EDITAR</button>

                <button type="button" class="btn btn-eliminar"
                        th:data-id="${c.idCategoria}"
                        onclick="prepararEliminar(this)">ELIMINAR</button>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="symbol-footer">|-/</div>
</div>

<div id="miModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitulo" style="font-family: 'Oswald'; color: white; margin-top:0;">EXPEDIENTE_CATEGORIA</h2>
        <form id="formCategoria" method="post">
            <input type="hidden" name="idCategoria" id="inputID">
            <div id="camposFormulario">
                <div class="campo">
                    <label>NOMBRE CATEGORÍA</label>
                    <input type="text" name="nombreCategoria" id="inputNombre" required>
                </div>
                <div class="campo">
                    <label>DESCRIPCIÓN</label>
                    <input type="text" name="descripcionCategoria" id="inputDescripcion" required>
                </div>
            </div>
            <div id="msgConfirmarEliminar" style="display:none; color: var(--red); margin: 20px 0; font-size: 0.8rem;">
                ADVERTENCIA: ELIMINACIÓN PERMANENTE DE DATOS. ¿PROCEDER?
            </div>
            <div class="modal-footer">
                <button type="submit" id="btnAccion" class="btn btn-buscar">EJECUTAR</button>
                <button type="button" onclick="cerrarModal()" class="btn btn-cancelar">ABORTAR</button>
            </div>
        </form>
        <div style="margin-top: 15px; color: var(--red); font-weight: bold;">|-/</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = Math.random() * 1 - 0.5;
            this.speedY = Math.random() * 1 + 0.3;
            this.opacity = Math.random() * 0.4 + 0.1;
        }
        update() {
            this.y -= this.speedY;
            this.x += this.speedX;
            if (this.y < 0) { this.y = canvas.height; this.x = Math.random() * canvas.width; }
        }
        draw() {
            ctx.fillStyle = `rgba(227, 25, 55, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function init() { for (let i = 0; i < 70; i++) { particles.push(new Particle()); } }
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    init(); animate();

    const modal = document.getElementById('miModal');
    const form = document.getElementById('formCategoria');
    const titulo = document.getElementById('modalTitulo');
    const btnAccion = document.getElementById('btnAccion');
    const msgEliminar = document.getElementById('msgConfirmarEliminar');
    const contenedorCampos = document.getElementById('camposFormulario');

    function abrirModal(tipo, id, nombre, descripcion) {
        modal.style.display = "block";
        msgEliminar.style.display = "none";
        contenedorCampos.style.display = "block";
        btnAccion.style.backgroundColor = "var(--red)";

        const inputs = form.querySelectorAll('input[required]');

        if (tipo === 'nuevo') {
            titulo.innerText = "NUEVA_CATEGORIA";
            btnAccion.innerText = "GUARDAR_DATOS";
            form.action = "/categorias/guardar";
            form.reset();
            inputs.forEach(i => i.required = true);
        } else if (tipo === 'editar') {
            titulo.innerText = "MODIFICAR_CATEGORIA";
            btnAccion.innerText = "ACTUALIZAR_DATOS";
            form.action = "/categorias/actualizar";
            document.getElementById('inputID').value = id;
            document.getElementById('inputNombre').value = nombre;
            document.getElementById('inputDescripcion').value = descripcion;
            inputs.forEach(i => i.required = true);
        } else if (tipo === 'eliminar') {
            titulo.innerText = "ELIMINAR_CATEGORIA";
            btnAccion.innerText = "CONFIRMAR_BAJA";
            form.action = "/categorias/eliminar/" + id;
            document.getElementById('inputID').value = id;
            msgEliminar.style.display = "block";
            contenedorCampos.style.display = "none";

            const camposInputs = contenedorCampos.querySelectorAll('input');
            camposInputs.forEach(i => i.required = false);
        }
    }

    function prepararEditar(btn) {
        abrirModal('editar', btn.getAttribute('data-id'), btn.getAttribute('data-nombre'), btn.getAttribute('data-descripcion'));
    }

    function prepararEliminar(btn) {
        abrirModal('eliminar', btn.getAttribute('data-id'));
    }

    function cerrarModal() { modal.style.display = "none"; form.reset(); }
    window.onclick = (event) => { if (event.target == modal) cerrarModal(); }
</script>
</body>
</html>
