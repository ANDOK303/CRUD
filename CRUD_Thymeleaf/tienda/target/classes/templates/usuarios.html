<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TØP - Gestión de Usuarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e31937; --black: #050505; --yellow: #fce300; --white: #ffffff; --gray-card: rgba(18, 18, 18, 0.9); }
        body { margin: 0; font-family: 'Roboto Mono', monospace; background-color: var(--black); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .container-principal { position: relative; z-index: 10; max-width: 1100px; margin: 40px auto; background: var(--gray-card); padding: 30px; border-left: 5px solid var(--red); backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .titulo { font-family: 'Oswald', sans-serif; text-align: center; color: var(--white); font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 30px; border-bottom: 2px solid var(--red); display: inline-block; width: 100%; padding-bottom: 10px; text-transform: uppercase; }
        .header-acciones { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; }
        .buscador-form { display: flex; gap: 10px; }
        .input-search { background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 0; font-family: 'Roboto Mono', monospace; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; font-family: 'Oswald', sans-serif; font-size: 1rem; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s; }
        .btn-buscar { background-color: var(--red); color: white; }
        .btn-home { background-color: transparent; border: 1px solid var(--white); color: white; }
        .btn-nuevo { background-color: var(--yellow); color: black; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.3); }
        th { background-color: #000; color: var(--red); font-family: 'Oswald', sans-serif; padding: 15px; border-bottom: 2px solid var(--red); letter-spacing: 2px; }
        td { padding: 15px; border-bottom: 1px solid #222; text-align: center; }
        .btn-editar { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); font-size: 0.8rem; margin-right: 5px; }
        .btn-eliminar { background: transparent; border: 1px solid var(--red); color: var(--red); font-size: 0.8rem; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background-color: var(--gray-card); margin: 10% auto; padding: 30px; width: 350px; border: 2px solid var(--red); text-align: center; }
        .campo { margin-bottom: 20px; text-align: left; }
        .campo label { display: block; font-size: 0.8rem; color: var(--red); margin-bottom: 5px; }
        .campo input { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: white; box-sizing: border-box; }
        .modal-footer { display: flex; justify-content: space-between; margin-top: 25px; }
        .btn-cancelar { background: #333; color: white; }
        .symbol-footer { text-align: center; margin-top: 30px; font-size: 1.8rem; font-weight: bold; color: var(--white); letter-spacing: 8px; opacity: 0.8; }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container-principal">
    <h1 class="titulo">CONTROL_DE_USUARIOS</h1>

    <div class="header-acciones">
        <form th:action="@{/usuarios/buscar}" method="get" class="buscador-form">
            <input type="number" name="id" class="input-search" placeholder="CÓDIGO_ID" required>
            <button type="submit" class="btn btn-buscar">BUSCAR</button>
            <a th:href="@{/usuarios}" class="btn btn-home">REINICIAR</a>
        </form>

        <div style="display: flex; gap: 10px;">
            <a th:href="@{/}" class="btn btn-home">VOLVER_AL_INICIO</a>
            <button type="button" onclick="abrirModal('nuevo')" class="btn btn-nuevo">+ NUEVO_USUARIO</button>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>NOMBRE</th>
            <th>APELLIDO</th>
            <th>EDAD</th>
            <th>ACCIONES</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${usuarios}">
            <td th:text="${u.idUsuario}"></td>
            <td th:text="${u.nombreUsu}"></td>
            <td th:text="${u.apellidoUsu}"></td>
            <td th:text="${u.edadUsu}"></td>
            <td>
                <button type="button" class="btn btn-editar"
                        th:data-id="${u.idUsuario}"
                        th:data-nombre="${u.nombreUsu}"
                        th:data-apellido="${u.apellidoUsu}"
                        th:data-edad="${u.edadUsu}"
                        onclick="prepararEditar(this)">EDITAR</button>
                <button type="button" class="btn btn-eliminar"
                        th:data-id="${u.idUsuario}"
                        onclick="prepararEliminar(this)">ELIMINAR</button>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="symbol-footer">|-/</div>
</div>

<div id="miModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitulo" style="font-family: 'Oswald'; color: white; margin-top:0;">EXPEDIENTE_USUARIO</h2>
        <form id="formUsuario" method="post">
            <input type="hidden" name="idUsuario" id="inputID">
            <div id="camposFormulario">
                <div class="campo">
                    <label>NOMBRE</label>
                    <input type="text" name="nombreUsu" id="inputNombre" required>
                </div>
                <div class="campo">
                    <label>APELLIDO</label>
                    <input type="text" name="apellidoUsu" id="inputApellido" required>
                </div>
                <div class="campo">
                    <label>EDAD</label>
                    <input type="number" name="edadUsu" id="inputEdad" required>
                </div>
            </div>
            <div id="msgConfirmarEliminar" style="display:none; color: var(--red); margin: 20px 0; font-size: 0.8rem;">
                ADVERTENCIA: ELIMINACIÓN PERMANENTE. ¿PROCEDER?
            </div>
            <div class="modal-footer">
                <button type="submit" id="btnAccion" class="btn btn-buscar">EJECUTAR</button>
                <button type="button" onclick="cerrarModal()" class="btn btn-cancelar">ABORTAR</button>
            </div>
        </form>
    </div>
</div>

<script>
    const modal = document.getElementById('miModal');
    const form = document.getElementById('formUsuario');
    const titulo = document.getElementById('modalTitulo');
    const btnAccion = document.getElementById('btnAccion');
    const msgEliminar = document.getElementById('msgConfirmarEliminar');
    const contenedorCampos = document.getElementById('camposFormulario');

    function abrirModal(tipo, id, nombre, apellido, edad) {
        modal.style.display = "block";
        if (tipo === 'nuevo') {
            titulo.innerText = "NUEVO_USUARIO";
            form.action = "/usuarios/guardar";
            form.reset();
            contenedorCampos.style.display = "block";
            msgEliminar.style.display = "none";
        } else if (tipo === 'editar') {
            titulo.innerText = "MODIFICAR_USUARIO";
            form.action = "/usuarios/actualizar";
            document.getElementById('inputID').value = id;
            document.getElementById('inputNombre').value = nombre;
            document.getElementById('inputApellido').value = apellido;
            document.getElementById('inputEdad').value = edad;
            contenedorCampos.style.display = "block";
            msgEliminar.style.display = "none";
        } else if (tipo === 'eliminar') {
            titulo.innerText = "ELIMINAR_USUARIO";
            form.action = "/usuarios/eliminar/" + id;
            document.getElementById('inputID').value = id;
            contenedorCampos.style.display = "none";
            msgEliminar.style.display = "block";
        }
    }

    function prepararEditar(btn) {
        abrirModal('editar', btn.getAttribute('data-id'), btn.getAttribute('data-nombre'), btn.getAttribute('data-apellido'), btn.getAttribute('data-edad'));
    }
    function prepararEliminar(btn) {
        abrirModal('eliminar', btn.getAttribute('data-id'));
    }
    function cerrarModal() { modal.style.display = "none"; }
</script>
</body>
</html>
